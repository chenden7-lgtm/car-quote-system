<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partial Quote - Car Quote System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h1 style="text-align:center; margin-top:2rem; color:var(--primary);">汽車報價系統</h1>

    <!-- Header Panel -->
    <header>
        <div class="logo-container">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1s.67-1.5 1-1.5 1.5.67 1.5 1.5-.67 1-1.5 1zm11 0c-.83 0-1.5-.67-1.5-1s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1-1.5 1zM5 11l1.5-4.5h11L19 11H5z"/>
                </svg>
            </div>
            <div class="logo-text">好室多膜<span>施工報價</span></div>
        </div>
        <div class="header-actions">
            <button class="btn btn-secondary" id="btnPrintQuote" style="padding: 0.6rem 1.2rem; font-size: 0.85rem;">
                <svg viewBox="0 0 24 24" style="width:1.1rem; height:1.1rem; fill:white;"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg>
                列印 / 匯出 PDF
            </button>
            <a href="full-quote.html" class="btn btn-primary" style="padding: 0.6rem 1.2rem; font-size: 0.85rem; margin-left:0.5rem;">全車報價單</a>
        </div>
    </header>

    <!-- Main Grid Dashboard -->
    <main>
        
        <!-- Left Panel: Customer Info & History -->
        <section class="left-panel glass-card">
            <div class="panel-title">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                客戶與車輛資訊
            </div>
            
            <div class="form-group">
                <label for="customerName">車主姓名</label>
                <input type="text" id="customerName" placeholder="例如：王小明">
            </div>

            <div class="form-group">
                <label for="customerPhone">聯絡電話</label>
                <input type="tel" id="customerPhone" placeholder="例如：0912-345678">
            </div>

            <div class="form-group">
                <label for="plateNumber">車牌號碼</label>
                <input type="text" id="plateNumber" placeholder="例如：ABC-1234" style="text-transform: uppercase;">
            </div>

            <div class="form-group">
                <label for="brandModel">廠牌車型 (選填)</label>
                <input type="text" id="brandModel" placeholder="例如：Tesla Model Y">
            </div>

            <div class="form-group">
                <label for="brandType">品牌車型類別</label>
                <select id="brandType">
                    <option value="others" selected>其他品牌車型</option>
                    <option value="tesla">Tesla 特斯拉專區</option>
                </select>
            </div>

            <div class="form-group" id="subGroupTesla" style="display: none;">
                <label>Tesla 車型規格</label>
                <div class="vehicle-grid" style="grid-template-columns: repeat(5, 1fr); gap: 0.4rem;">
                    <button type="button" class="vehicle-type-btn" data-type="Model 3">3</button>
                    <button type="button" class="vehicle-type-btn active" data-type="Model Y">Y</button>
                    <button type="button" class="vehicle-type-btn" data-type="新款Model Y" style="font-size: 0.7rem; padding: 0.4rem 0.2rem;">新款Y</button>
                    <button type="button" class="vehicle-type-btn" data-type="Model S">S</button>
                    <button type="button" class="vehicle-type-btn" data-type="Model X">X</button>
                </div>
            </div>

            <div id="subGroupOthers">
                <div class="form-group">
                    <label for="vehicleTypeSelect">車身造型樣式 (預覽預設外觀)</label>
                    <select id="vehicleTypeSelect">
                        <option value="sedan" selected>轎車 / 跑車</option>
                        <option value="suv">休旅車</option>
                        <option value="van">箱型車</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="vehicleMethodSelect">後葉/側裙施工工法</label>
                    <select id="vehicleMethodSelect">
                        <option value="ac" selected>後葉連 A/C 柱</option>
                        <option value="ac_skirt">後葉連 A/C 柱連側裙</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="vehicleSizeSelect">車身尺寸規格 (查價依據)</label>
                    <select id="vehicleSizeSelect">
                        <option value="S" selected>S (小車)</option>
                        <option value="M">M (中型車)</option>
                        <option value="L">L (大型車)</option>
                        <option value="XL">XL (特大型車)</option>
                        <option value="2XL">2XL (超大型車)</option>
                        <option value="其他">其他 (特殊車)</option>
                    </select>
                </div>
            </div>

            <!-- History List -->
            <div style="margin-top: auto; display: flex; flex-direction: column; gap: 0.75rem;">
                <div class="panel-title" style="border-top: 1px solid var(--border-color); padding-top: 1rem; border-bottom: none; padding-bottom: 0;">
                    <svg viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.53.85-1.07-3.63-2.16V8h-1.5z"/></svg>
                    最近報價紀錄 (本地)
                </div>
                <div class="history-list" id="historyContainer">
                    <!-- Rendered via JS -->
                </div>
            </div>
        </section>

        <!-- Center Panel: Interactive Car Visualizer & Config Drawer -->
        <section class="center-panel">
            <div class="visualizer-container">
                <!-- Global SVG Definitions (Always visible to ensure gradient resolution, but 0-sized) -->
                <svg width="0" height="0" style="position: absolute; pointer-events: none;">
                    <defs>
                        <radialGradient id="car-shadow-grad" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="rgba(0,0,0,0.5)" />
                            <stop offset="100%" stop-color="rgba(0,0,0,0)" />
                        </radialGradient>
                    </defs>
                </svg>

                <div class="view-tabs">
                    <button class="view-tab active" data-view="side">車側視角</button>
                    <button class="view-tab" data-view="front">車頭視角</button>
                    <button class="view-tab" data-view="rear">車尾視角</button>
                </div>

                <div class="quick-selector-container" style="margin: 0.5rem 1rem 0; padding: 0.4rem; border-radius: 0.5rem; background: rgba(15,23,42,0.03); display: flex; align-items: center; gap: 0.5rem; border: 1px solid var(--border-color);">
                    <label for="quickPartSelect" style="font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); white-space: nowrap; margin-left: 0.25rem;">🔍 快速選擇施工部位：</label>
                    <select id="quickPartSelect" style="flex: 1; padding: 0.35rem 0.6rem; font-size: 0.85rem; border-radius: 0.4rem; background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-primary); cursor: pointer; outline: none;">
                        <!-- Options generated dynamically based on brandType -->
                    </select>
                </div>

                        </g>
                    </svg>
                </div>

                <div class="car-svg-wrapper" id="sedan-front-view-wrapper" style="display: none;">
                    <svg class="car-svg" viewBox="0 0 400 280">
                        <line x1="20" y1="240" x2="380" y2="240" stroke="rgba(255,255,255,0.08)" stroke-width="2" class="non-clickable" />

                    <svg class="car-svg" viewBox="0 0 800 280">

            <!-- Configuration Drawer (Opens below SVG Car when part is clicked) -->
            <div class="glass-card configurator-card" id="configCard">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="display:flex; flex-direction:column; gap:0.25rem;">
                        <span class="selected-part-badge" id="selectedPartName">引擎蓋</span>
                        <div style="font-size:0.8rem; color:var(--text-secondary);">請選取此部位需要施作的貼膜項目 (可多選)：</div>
                    </div>
                    <button class="quote-item-delete" id="btnCloseConfig" style="padding: 0.5rem; background:rgba(255,255,255,0.05); border-radius:50%;" title="關閉面板">
                        <svg viewBox="0 0 24 24" style="width:1.25rem; height:1.25rem; fill:var(--text-secondary);"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                    </button>
                </div>
                
                <!-- Services Cards Layout -->
                <div class="service-options" id="configServicesGrid">
                    <!-- Loaded dynamically via app.js -->
                </div>
            </div>
        </section>

        <!-- Right Panel: Quotation Details Builder -->
        <section class="right-panel glass-card">
            <div class="panel-title" style="justify-content: space-between;">
                <div style="display:flex; align-items:center; gap:0.5rem;">
                    <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                    即時報價明細
                </div>
                <span id="selectedItemsCount" style="font-size:0.8rem; background:var(--primary-glow); border:1px solid var(--primary); padding:0.15rem 0.5rem; border-radius:1rem; font-weight:600;">0 項</span>
            </div>

            <!-- Repair Items List -->
            <div class="quote-items-container" id="quoteItemsContainer">
                <!-- Rendered dynamically -->
            </div>

            <!-- Discount field -->
            <div class="form-group" style="border-top: 1px solid var(--border-color); padding-top: 1rem;">
                <label for="discountInput">優惠折扣 (輸入折扣成數，例如 90 代表 9 折)</label>
                <div class="flex-row">
                    <input type="number" id="discountInput" value="100" min="0" max="100" style="flex: 1;">
                    <span style="display:flex; align-items:center; font-size:0.9rem; color:var(--text-secondary);">%</span>
                </div>
            </div>

            <!-- Summary Calculations -->
            <div class="summary-panel mt-auto" id="summary-panel" style="margin-top: 1rem; border-top: 1px solid var(--border-color); padding-top: 1rem;">
                <div class="summary-row" style="display:flex; justify-content:space-between; font-size:0.9rem; color:var(--text-secondary); margin-bottom:0.5rem;">
                    <span>項目小計</span>
                    <span id="valSubtotal">NT$ 0</span>
                </div>
                <div class="summary-row" style="display:flex; justify-content:space-between; font-size:0.9rem; color:var(--text-secondary); margin-bottom:0.5rem;">
                    <span>優惠折抵</span>
                    <span id="valDiscount">- NT$ 0 (無)</span>
                </div>
                <div class="summary-row" style="display:flex; justify-content:space-between; font-size:0.9rem; color:var(--text-secondary); margin-bottom:0.5rem;">
                    <span>營業稅 (5% 內含)</span>
                    <span id="valVat">NT$ 0</span>
                </div>
                <div class="summary-row total" style="display:flex; justify-content:space-between; font-size:1.15rem; font-weight:bold; color:var(--text-primary); margin-top:0.75rem; border-top:1px dashed var(--border-color); padding-top:0.75rem;">
                    <span>估計總價</span>
                    <span class="price" id="valTotal" style="color:var(--primary);">NT$ 0</span>
                </div>
            </div>

            <!-- Buttons Actions -->
            <div class="actions-row">
                <button class="btn btn-secondary btn-danger" id="btnClearQuote">
                    <svg viewBox="0 0 24 24" style="width:1rem; height:1rem; fill:var(--accent-red);"><path d="M19 4h-3.5l-1-1h-5l-1 1H5v2h14V4zM6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12z"/></svg>
                    清除重設
                </button>
                <button class="btn" id="btnSaveQuote">
                    <svg viewBox="0 0 24 24" style="width:1rem; height:1rem; fill:white;"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>
                    儲存報價
                </button>
            </div>
        </section>

    </main>

    <!-- Invisible Printing Template (Rendered and hidden on screen, targets CSS print query) -->
    <div id="print-area">
        <!-- Rendered dynamically via app.js triggerPrint() -->
    </div>

    <!-- Notification Toast -->
    <div class="toast" id="toastNotification">
        <svg class="toast-icon" viewBox="0 0 24 24">
            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
        </svg>
        <span class="toast-message">訊息提示內容</span>
    </div>

    <script src="pricingData.js"></script>
    <script src="app.js"></script>
</body>
</html>
